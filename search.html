<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise Library Search</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"],
        select {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .filters-info {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .filters-info span {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
            margin-right: 10px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 1.1em;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .results-section {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .exercise-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .exercise-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .exercise-card .slug {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }

        .exercise-info {
            font-size: 0.95em;
            line-height: 1.6;
            color: #555;
        }

        .exercise-info div {
            margin-bottom: 8px;
        }

        .label {
            font-weight: 600;
            color: #333;
            display: inline-block;
            min-width: 120px;
        }

        .value {
            color: #666;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .tag {
            background: #e8eaf6;
            color: #667eea;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .modal-slug {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section h3 {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 10px;
            border-bottom: 2px solid #e8eaf6;
            padding-bottom: 8px;
        }

        .detail-list {
            list-style: none;
            padding-left: 0;
        }

        .detail-list li {
            padding: 8px 0;
            color: #555;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-list li:before {
            content: "▸ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 8px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            padding: 10px 15px;
            min-width: 45px;
        }

        .pagination button.active {
            background: #667eea;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-info {
            text-align: center;
            color: white;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .no-results {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: #999;
        }

        .no-results-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .search-box {
                flex-direction: column;
            }

            input[type="text"],
            select {
                min-width: 100%;
            }

            .results-section {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💪 Exercise Library Search</h1>
            <p>Find the perfect exercises for your workout</p>
        </header>

        <div class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search exercises by name (e.g., squat, bench press)..."
                    autocomplete="off"
                >
                <select id="tagFilter">
                    <option value="">Filter by Tag (All)</option>
                    <option value="push">Push</option>
                    <option value="pull">Pull</option>
                    <option value="compound">Compound</option>
                    <option value="isolation">Isolation</option>
                    <option value="core">Core</option>
                    <option value="cardio">Cardio</option>
                </select>
                <select id="equipmentFilter">
                    <option value="">Filter by Equipment (All)</option>
                    <option value="Barbell">Barbell</option>
                    <option value="Dumbbell">Dumbbell</option>
                    <option value="Bands">Bands</option>
                    <option value="Cable">Cable</option>
                    <option value="Body Only">Body Only</option>
                    <option value="Machine">Machine</option>
                </select>
                <button onclick="search()">Search</button>
            </div>
            <div class="filters-info" id="filtersInfo">
                Tip: Press Enter to search • Combine filters for better results
            </div>
        </div>

        <div id="resultsContainer">
            <div class="results-info" id="resultsInfo"></div>
            <div id="errorContainer"></div>
            <div class="results-section" id="resultsList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- Modal for detailed view -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modalExerciseName"></h2>
                    <div class="modal-slug" id="modalExerciseSlug"></div>
                </div>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>

            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentPage = 1;
        const itemsPerPage = 12;
        let totalResults = 0;
        let lastSearchParams = {};

        // Event listeners
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });

        document.getElementById('tagFilter').addEventListener('change', () => {
            currentPage = 1;
            search();
        });

        document.getElementById('equipmentFilter').addEventListener('change', () => {
            currentPage = 1;
            search();
        });

        async function search() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const tag = document.getElementById('tagFilter').value;
            const equipment = document.getElementById('equipmentFilter').value;

            if (!searchTerm && !tag && !equipment) {
                document.getElementById('errorContainer').innerHTML = '<div class="error">Please enter a search term or select a filter</div>';
                return;
            }

            const params = new URLSearchParams({
                limit: itemsPerPage,
                offset: (currentPage - 1) * itemsPerPage,
                ...(searchTerm && { search: searchTerm }),
                ...(tag && { tag }),
                ...(equipment && { equipment })
            });

            lastSearchParams = { searchTerm, tag, equipment };

            showLoading();

            try {
                const response = await fetch(`${API_BASE}/exercises?${params}`);
                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                totalResults = data.total;

                displayResults(data.items);
                displayPagination();
                updateResultsInfo();

            } catch (error) {
                showError(`Failed to fetch exercises: ${error.message}`);
            }
        }

        function displayResults(exercises) {
            const resultsList = document.getElementById('resultsList');
            const errorContainer = document.getElementById('errorContainer');

            errorContainer.innerHTML = '';

            if (exercises.length === 0) {
                resultsList.innerHTML = '<div class="no-results"><div class="no-results-icon">🔍</div><p>No exercises found matching your criteria</p></div>';
                return;
            }

            resultsList.innerHTML = exercises.map(ex => `
                <div class="exercise-card" onclick="showDetails(${ex.id}, '${ex.slug}')">
                    <h3>${ex.name}</h3>
                    <div class="slug">/${ex.slug}</div>
                    <div class="exercise-info">
                        <div>
                            <span class="label">Muscle:</span>
                            <span class="value">${ex.primary_muscle || 'N/A'}</span>
                        </div>
                        <div>
                            <span class="label">Equipment:</span>
                            <span class="value">${ex.equipment || 'Body Only'}</span>
                        </div>
                        <div>
                            <span class="label">Difficulty:</span>
                            <span class="value">${ex.difficulty || 'N/A'}</span>
                        </div>
                        ${ex.tags && ex.tags.length > 0 ? `
                            <div class="tags">
                                ${ex.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            resultsList.innerHTML += '<div style="grid-column: 1 / -1; height: 0;"></div>';
        }

        async function showDetails(exerciseId, slug) {
            try {
                const response = await fetch(`${API_BASE}/exercises/${slug}`);
                if (!response.ok) throw new Error('Exercise not found');

                const exercise = await response.json();

                const modalBody = document.getElementById('modalBody');
                const muscleList = exercise.secondary_muscles && exercise.secondary_muscles.length > 0
                    ? exercise.secondary_muscles.join(', ')
                    : 'None';

                const instructionsList = exercise.instructions && exercise.instructions.length > 0
                    ? exercise.instructions.map(i => `<li>${i}</li>`).join('')
                    : '<li>No instructions provided</li>';

                const formCuesList = exercise.form_cues && exercise.form_cues.length > 0
                    ? exercise.form_cues.map(c => `<li>${c}</li>`).join('')
                    : '<li>No form cues provided</li>';

                const mistakesList = exercise.common_mistakes && exercise.common_mistakes.length > 0
                    ? exercise.common_mistakes.map(m => `<li>${m}</li>`).join('')
                    : '<li>No common mistakes listed</li>';

                modalBody.innerHTML = `
                    <div class="detail-section">
                        <h3>Basic Information</h3>
                        <div class="exercise-info">
                            <div><span class="label">Category:</span> <span class="value">${exercise.category || 'N/A'}</span></div>
                            <div><span class="label">Movement:</span> <span class="value">${exercise.movement_pattern || 'N/A'}</span></div>
                            <div><span class="label">Primary Muscle:</span> <span class="value">${exercise.primary_muscle || 'N/A'}</span></div>
                            <div><span class="label">Secondary Muscles:</span> <span class="value">${muscleList}</span></div>
                            <div><span class="label">Equipment:</span> <span class="value">${exercise.equipment || 'Body Only'}</span></div>
                            <div><span class="label">Difficulty:</span> <span class="value">${exercise.difficulty || 'N/A'}</span></div>
                        </div>
                    </div>

                    ${exercise.tags && exercise.tags.length > 0 ? `
                        <div class="detail-section">
                            <h3>Tags</h3>
                            <div class="tags">
                                ${exercise.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <div class="detail-section">
                        <h3>📋 Instructions</h3>
                        <ul class="detail-list">${instructionsList}</ul>
                    </div>

                    <div class="detail-section">
                        <h3>✓ Form Cues</h3>
                        <ul class="detail-list">${formCuesList}</ul>
                    </div>

                    <div class="detail-section">
                        <h3>⚠️ Common Mistakes</h3>
                        <ul class="detail-list">${mistakesList}</ul>
                    </div>

                    ${exercise.video_url ? `
                        <div class="detail-section">
                            <h3>🎥 Video</h3>
                            <a href="${exercise.video_url}" target="_blank" style="color: #667eea; text-decoration: none;">View Video Guide →</a>
                        </div>
                    ` : ''}
                `;

                document.getElementById('modalExerciseName').textContent = exercise.name;
                document.getElementById('modalExerciseSlug').textContent = `Slug: ${exercise.slug}`;

                document.getElementById('detailModal').classList.add('active');

            } catch (error) {
                alert('Could not load exercise details: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function displayPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(totalResults / itemsPerPage);

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';

            // Previous button
            if (currentPage > 1) {
                html += `<button onclick="goToPage(${currentPage - 1})">← Previous</button>`;
            }

            // Page numbers
            const maxButtons = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPages, startPage + maxButtons - 1);

            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            if (startPage > 1) {
                html += `<button onclick="goToPage(1)">1</button>`;
                if (startPage > 2) html += '<span style="color: white;">...</span>';
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += '<span style="color: white;">...</span>';
                html += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
            }

            // Next button
            if (currentPage < totalPages) {
                html += `<button onclick="goToPage(${currentPage + 1})">Next →</button>`;
            }

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            search();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateResultsInfo() {
            const info = document.getElementById('resultsInfo');
            const { searchTerm, tag, equipment } = lastSearchParams;

            let filterText = [];
            if (searchTerm) filterText.push(`Search: "${searchTerm}"`);
            if (tag) filterText.push(`Tag: ${tag}`);
            if (equipment) filterText.push(`Equipment: ${equipment}`);

            const startItem = (currentPage - 1) * itemsPerPage + 1;
            const endItem = Math.min(currentPage * itemsPerPage, totalResults);

            info.innerHTML = `
                <strong>Found ${totalResults} exercises</strong> | 
                Showing ${startItem}-${endItem} | 
                ${filterText.join(' • ')}
            `;
        }

        function showLoading() {
            document.getElementById('resultsList').innerHTML = '<div class="loading">🔄 Loading exercises...</div>';
            document.getElementById('pagination').innerHTML = '';
            document.getElementById('resultsInfo').innerHTML = '';
        }

        function showError(message) {
            document.getElementById('errorContainer').innerHTML = `<div class="error">${message}</div>`;
            document.getElementById('resultsList').innerHTML = '';
            document.getElementById('pagination').innerHTML = '';
        }

        // Prevent modal close on content click
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('detailModal')) {
                closeModal();
            }
        });

        // Load initial exercises on page load
        window.addEventListener('load', () => {
            // Uncomment to show all exercises on load
            // document.getElementById('searchInput').value = '';
            // document.getElementById('tagFilter').value = '';
            // document.getElementById('equipmentFilter').value = '';
            // search();
        });
    </script>
</body>
</html>
